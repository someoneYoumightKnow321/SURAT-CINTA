<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  overflow: hidden;
  transition: 0.5s;
}

/* tombol */
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
  z-index: 1000;
}

/* container */
.container {
  position: absolute;
  text-align: center;
  color: white;
  opacity: 0;
  transition: 1s;
  pointer-events: none;
}

.container.show {
  opacity: 1;
}

/* romantis */
.romantic h1 {
  text-shadow: 0 0 20px rgba(255,255,255,0.8);
}

/* heart */
.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: float 4s linear forwards;
}

@keyframes float {
  to {
    transform: translateY(-120vh);
    opacity: 0;
  }
}

/* CHAOS */
.chaos {
  animation: shake 0.1s infinite;
}

@keyframes shake {
  0% { transform: translate(3px,3px); }
  25% { transform: translate(-3px,3px); }
  50% { transform: translate(3px,-3px); }
  75% { transform: translate(-3px,-3px); }
  100% { transform: translate(3px,3px); }
}

/* glitch overlay */
.glitch {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}

.glitch::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,0,0,0.15);
  transform: translate(2px,0);
}

.glitch::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,255,0.15);
  transform: translate(-2px,0);
}

/* scanline */
.scanline {
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.05) 3px
  );
  pointer-events: none;
  z-index: 998;
}

/* glitch text */
.glitch-text {
  animation: glitchText 0.2s infinite;
  color: red;
  font-size: 70px;
}

@keyframes glitchText {
  0% { transform: translate(2px,0); }
  25% { transform: translate(-2px,1px); }
  50% { transform: translate(2px,-1px); }
  75% { transform: translate(-1px,-2px); }
  100% { transform: translate(1px,2px); }
}

/* emoji chaos */
.emoji {
  position: absolute;
  top: -50px;
  font-size: 30px;
  animation: fall 1.2s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<button id="btn">Klik Aku 💌</button>

<div class="container romantic" id="box">
  <h1 id="text">Aku punya sesuatu buat kamu ❤️</h1>
  <p id="sub">Tunggu ya...</p>
</div>

<div class="glitch" id="glitch"></div>
<div class="scanline"></div>

<audio id="prankSound" src="prank.mp3"></audio>

<script>
const btn = document.getElementById("btn");
const box = document.getElementById("box");
const text = document.getElementById("text");
const sub = document.getElementById("sub");
const sound = document.getElementById("prankSound");
const glitch = document.getElementById("glitch");

function start() {
  btn.style.display = "none";
  box.classList.add("show");

  // 💖 ROMANTIS
  setTimeout(() => {
    text.innerHTML = "Aku sayang banget sama kamu ❤️";
  }, 1500);

  setTimeout(() => {
    sub.innerHTML = "Kamu itu spesial buat aku ✨";
  }, 3000);

  setTimeout(() => {
    text.innerHTML = "Semoga kita selalu bareng ya 🥺";
  }, 5000);

  // ❤️ efek hati (disimpan biar bisa dihentikan)
  let heartInterval = setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 4000);
  }, 300);

  // 💀 MASUK MODE GLITCH (10 DETIK)
  setTimeout(() => {

    // 🔥 STOP LOVE EFFECT
    clearInterval(heartInterval);

    // 🔥 langsung ubah vibe
    document.body.style.background = "black";

    text.innerHTML = "PRANK 😈";
    sub.innerHTML = "KENA TIPU 🤡";

    // 🔊 SOUND
    sound.volume = 0.1;
    sound.currentTime = 0;
    sound.play();

    let vol = 0.1;
    let naik = setInterval(() => {
      vol += 0.1;
      if (vol >= 1) clearInterval(naik);
      sound.volume = vol;
    }, 200);

    // CHAOS
    document.body.classList.add("chaos");
    text.classList.add("glitch-text");

    // glitch movement
    setInterval(() => {
      glitch.style.transform =
        `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
    }, 50);

    // screen jump
    setInterval(() => {
      document.body.style.transform =
        `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
    }, 100);

    // background flicker
    setInterval(() => {
      document.body.style.background =
        Math.random() > 0.5 ? "black" : "darkred";
    }, 150);

    // emoji chaos
    setInterval(() => {
      let e = document.createElement("div");
      e.innerHTML = ["🤡","💀","😈","😂"][Math.floor(Math.random()*4)];
      e.classList.add("emoji");
      e.style.left = Math.random() * window.innerWidth + "px";
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 1200);
    }, 80);

    // vibrate HP
    if (navigator.vibrate) {
      setInterval(() => navigator.vibrate(200), 400);
    }

  }, 10000);
}

btn.addEventListener("click", start, { once: true });
btn.addEventListener("touchstart", start, { once: true });
</script>

</body>
</html>
